<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Forgot Password — BookHaven</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600&display=swap"
          rel="stylesheet">

    <style>
        body{
            font-family: "Plus Jakarta Sans", sans-serif;
        }
    </style>

</head>

<body class="min-h-screen flex items-center justify-center bg-gradient-to-br from-indigo-50 via-white to-purple-50">

<div class="w-full max-w-sm bg-white rounded-xl shadow-lg border border-gray-100 p-6">

    <!-- Title -->
    <div class="text-center mb-6">

        <div class="w-12 h-12 bg-indigo-600 rounded-lg flex items-center justify-center mx-auto mb-3 shadow">
            📧
        </div>

        <h2 class="text-lg font-semibold text-gray-800">
            Forgot your password?
        </h2>

        <p class="text-sm text-gray-500 mt-1">
            Enter your email and we’ll send you a reset link.
        </p>

    </div>


    <!-- Error -->
    <div th:if="${error != null}"
         class="bg-red-50 text-red-600 text-sm p-2 rounded mb-3 text-center">
        [[${error}]]
    </div>


    <!-- Message -->
    <div th:if="${message != null}"
         class="bg-green-50 text-green-600 text-sm p-2 rounded mb-3 text-center">
        [[${message}]]
    </div>


    <!-- Form -->
    <form th:action="@{/forgot-password}" method="post" class="space-y-4">

        <input
                type="email"
                name="email"
                placeholder="Enter your email"
                required
                autofocus
                class="w-full text-sm border border-gray-200 rounded-md px-3 py-2
                       focus:outline-none focus:ring-2 focus:ring-indigo-500
                       focus:border-indigo-500">

        <button
                type="submit"
                class="w-full bg-indigo-600 text-white text-sm py-2 rounded-md
                       hover:bg-indigo-700 transition shadow">

            Send Reset Link

        </button>

    </form>


    <!-- Back to login -->
    <p class="text-center text-xs text-gray-500 mt-5">

        Remember your password?

        <a href="/login"
           class="text-indigo-600 hover:underline font-medium">
            Back to login
        </a>

    </p>

</div>

</body>
</html>
