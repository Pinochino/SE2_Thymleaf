<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Reset Password — BookHaven</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600&display=swap"
          rel="stylesheet">

    <style>
        body{
            font-family: "Plus Jakarta Sans", sans-serif;
        }
    </style>

</head>

<body class="min-h-screen flex items-center justify-center bg-gradient-to-br from-indigo-50 via-white to-purple-50">

<div class="w-full max-w-sm bg-white rounded-xl shadow-lg border border-gray-100 p-6">

    <!-- Title -->
    <div class="text-center mb-6">

        <div class="w-12 h-12 bg-indigo-600 text-white flex items-center justify-center rounded-lg mx-auto mb-3 shadow">
            🔐
        </div>

        <h2 class="text-lg font-semibold text-gray-800">
            Reset Your Password
        </h2>

        <p class="text-sm text-gray-500">
            Enter your new password below
        </p>

    </div>


    <!-- Message -->
    <div th:if="${message}"
         class="bg-yellow-50 text-yellow-700 text-sm p-2 rounded mb-4 text-center"
         th:text="${message}">
    </div>


    <!-- Form -->
    <form th:action="@{/reset-password}" method="post" class="space-y-4">

        <input type="hidden" name="token" th:value="${token}" />


        <!-- New password -->
        <input
                type="password"
                name="password"
                id="password"
                placeholder="New password"
                required
                autofocus
                class="w-full text-sm border border-gray-200 rounded-md px-3 py-2
                       focus:outline-none focus:ring-2 focus:ring-indigo-500
                       focus:border-indigo-500">


        <!-- Confirm password -->
        <input
                type="password"
                id="confirmPassword"
                placeholder="Confirm password"
                required
                oninput="checkPasswordMatch()"
                class="w-full text-sm border border-gray-200 rounded-md px-3 py-2
                       focus:outline-none focus:ring-2 focus:ring-indigo-500
                       focus:border-indigo-500">


        <p id="errorText" class="text-red-500 text-xs"></p>


        <!-- Submit -->
        <button
                type="submit"
                class="w-full bg-indigo-600 text-white text-sm py-2 rounded-md
                       hover:bg-indigo-700 transition shadow">

            Change Password

        </button>

    </form>


    <!-- Back -->
    <p class="text-center text-xs text-gray-500 mt-5">

        Remember your password?

        <a href="/login"
           class="text-indigo-600 hover:underline font-medium">
            Back to login
        </a>

    </p>

</div>


<script>

    function checkPasswordMatch(){

        const password = document.getElementById("password").value;
        const confirm = document.getElementById("confirmPassword");
        const error = document.getElementById("errorText");

        if(confirm.value !== password){
            confirm.setCustomValidity("Passwords do not match");
            error.textContent = "Passwords do not match";
        } else {
            confirm.setCustomValidity("");
            error.textContent = "";
        }

    }

</script>

</body>
</html>
