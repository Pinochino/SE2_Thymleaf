<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/_clientLayout}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="'Search – ' + (${query} != null ? '\'' + ${query} + '\'' : 'Novel Library')">Search</title>
    <link rel="stylesheet" th:href="@{/css/searchpage.css}"/>
</head>
<body>
<main layout:fragment="content">
    <div class="search-wrap">

        <!-- ── FILTER SIDEBAR ─────────────────────────────────────── -->
        <section id="filter-section">
            <form id="filter-form" th:action="@{/search/filter}" method="get">
                <input type="hidden" id="status-input" name="statusStr"
                       th:value="${selectedStatus ?: 'any'}"/>

                <!-- ── MOBILE header only ── -->
                <div id="filter-mobile-header" class="filter-header" style="display:none">
                    <span class="filter-title">FILTERS</span>
                    <button type="button" class="btn-reset" onclick="window.location.href='/search'">Reset</button>
                </div>

                <!-- ── DESKTOP header ── -->
                <div class="filter-header filter-header--desktop">
                    <span class="filter-title">FILTERS</span>
                    <button type="button" class="btn-reset" onclick="window.location.href='/search'">Reset</button>
                </div>

                <!-- ── SINGLE trending checkbox (shown in both) ── -->
                <label class="cb-wrap filter-trending filter-trending--desktop">
                    <input type="checkbox" name="trending" value="true" th:checked="${isTrending}">
                    <span class="cb-box"></span><span class="cb-label">Trending</span>
                </label>
                <hr class="filter-divider">

                <!-- ── SINGLE genre list ── -->
                <div class="filter-group filter-group--desktop">
                    <p class="filter-group-label">Genre</p>
                    <div id="genre-list" class="filter-genre-col">
                        <label class="cb-wrap" th:each="genre : ${genres}">
                            <input type="checkbox" name="genres"
                                   th:value="${genre.id}"
                                   th:checked="${selectedGenres != null
                               and selectedGenres.contains(genre.id.toString())}">
                            <span class="cb-box"></span>
                            <span class="cb-label" th:text="${genre.name}">Genre</span>
                        </label>
                    </div>
                </div>
                <hr class="filter-divider">

                <!-- ── SINGLE status pills group ── -->
                <div class="filter-status-group--desktop">
                    <p class="filter-group-label">Status</p>
                    <div class="filter-status-row" id="status-pills">
                        <button type="button" class="status-pill"
                                th:classappend="${selectedStatus == null or selectedStatus == 'any'} ? ' active'"
                                data-value="any">Any</button>
                        <button type="button" class="status-pill"
                                th:classappend="${selectedStatus == 'COMPLETED'} ? ' active'"
                                data-value="COMPLETED">Completed</button>
                        <button type="button" class="status-pill"
                                th:classappend="${selectedStatus == 'ONGOING'} ? ' active'"
                                data-value="ONGOING">Ongoing</button>
                        <button type="button" class="status-pill"
                                th:classappend="${selectedStatus == 'DROPPED'} ? ' active'"
                                data-value="DROPPED">Dropped</button>
                    </div>
                </div>

                <button type="submit" class="btn-apply">Apply Filters</button>
            </form>
        </section>

        <!-- ── RESULTS ────────────────────────────────────────────── -->
        <section id="results">

            <!-- Header -->
            <div class="results-header">
                <div>
                    <h1 class="results-title">
                        <span th:text="${searchMode == 'vector'} ? 'Vector Search:' : 'Filter Results:'">Results:</span>
                        <span class="results-title-query"
                              th:text="${query != null and !#strings.isEmpty(query)} ? '\'' + ${query} + '\'' : 'All Novels'">
                        'Epic Fantasy'
                    </span>
                    </h1>
                    <p class="results-count">
                        Found
                        <span th:text="${#numbers.formatInteger(totalResults, 1, 'COMMA')}">0</span>
                        result<span th:if="${totalResults != 1}">s</span>
                        <span th:text="${searchMode == 'vector'} ? 'by semantic similarity' : 'matching your filters'"></span>
                    </p>
                </div>

                <!-- Sort — only meaningful for filter mode -->
                <form th:if="${searchMode == 'filter'}" class="sort-form"
                      th:action="@{/search/filter}" method="get">
                    <input type="hidden" name="statusStr" th:value="${selectedStatus}"/>
                    <input type="hidden" name="trending" th:value="${isTrending ? 'true' : ''}"/>
                    <th:block th:each="gid : ${selectedGenres}">
                        <input type="hidden" name="genres" th:value="${gid}"/>
                    </th:block>
                    <input type="hidden" name="page" value="0"/>
                    <span class="sort-label">SORT BY:</span>
                    <select class="sort-select" name="sort" onchange="this.form.submit()">
                        <option value="asc" th:selected="${sort == 'asc'}">Ascending</option>
                        <option value="desc" th:selected="${sort == 'desc'}">Descending</option>
                    </select>
                </form>
            </div>

            <!-- Novel list -->
            <div id="novel-list"
                 th:if="${searchedNovels != null and not #lists.isEmpty(searchedNovels.content)}">
                <div class="novel-card"
                     th:each="novel : ${searchedNovels.content}"
                     th:attr="data-title=${novel.title}, data-rating=${novel.averageRating ?: 0}">

                    <!-- Cover -->
                    <div class="card-cover">
                        <div class="card-cover-inner">
                            <img th:if="${novel.coverImgUrl != null}"
                                 th:src="${novel.coverImgUrl}" th:alt="${novel.title}"/>
                            <span th:unless="${novel.coverImgUrl != null}"
                                  class="cover-label" th:text="${novel.title}">Novel Title</span>
                        </div>
                    </div>

                    <!-- Body -->
                    <div class="card-body">
                        <div class="card-head-row">
                            <a class="card-title"
                               th:href="@{/novels/information/{id}(id=${novel.publicId})}"
                               th:text="${novel.title}">Novel Title</a>
                            <span class="card-status-badge"
                                  th:classappend="${novel.status != null ? 'badge-' + #strings.toLowerCase(novel.status.name()) : 'badge-new'}"
                                  th:text="${novel.status != null ? novel.status.name() : 'New'}">Status</span>
                        </div>

                        <div class="card-meta">
                        <span class="meta-item" th:if="${novel.author != null}">
                            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                 stroke-width="2" stroke-linecap="round">
                                <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 4-7 8-7s8 3 8 7"/>
                            </svg>
                            <span th:text="${novel.author}">Author</span>
                        </span>
                            <span class="meta-item meta-item--rating" th:if="${novel.averageRating != null}">
                            <svg width="12" height="12" viewBox="0 0 24 24" stroke-width="1">
                                <polygon
                                        points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
                            </svg>
                            <span class="rating-value" th:text="${#numbers.formatDecimal(novel.averageRating, 1, 1)}">4.8</span>
                        </span>
                        </div>

                        <div class="card-genres" th:if="${novel.genres != null and !novel.genres.isEmpty()}">
                            <span class="genre-tag" th:each="genre : ${novel.genres}"
                                  th:text="${genre.name}">Genre</span>
                        </div>

                        <p class="card-description" th:if="${novel.description != null}"
                           th:text="${novel.description}">Description</p>

                        <div class="card-actions">
                            <a class="btn-read" th:href="@{/novels/information/{id}(id=${novel.publicId})}">
                                <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                                     stroke-width="1.5" stroke-linecap="round">
                                    <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
                                    <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
                                </svg>
                                Read Now
                            </a>
                            <button class="btn-save" th:data-novel-id="${novel.id}">
                                <svg width="14" height="14" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"
                                     stroke-linecap="round" stroke-linejoin="round" fill="none">
                                    <path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8z"/>
                                </svg>
                                <span>Save</span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Empty state -->
            <div class="empty-state"
                 th:if="${searchedNovels == null or #lists.isEmpty(searchedNovels.content)}">
                <svg width="48" height="48" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.2">
                    <circle cx="11" cy="11" r="8"/>
                    <path d="m21 21-4.35-4.35"/>
                </svg>
                <p class="empty-state__title">No novels found</p>
                <p class="empty-state__sub">Try a different search term or adjust your filters.</p>
            </div>

            <!-- ── PAGINATION ──────────────────────────────────────── -->
            <div class="pagination" th:if="${totalPages != null and totalPages > 0}">

                <!-- hidden form — action depends on searchMode -->
                <form id="page-form"
                      th:action="${searchMode == 'vector'} ? @{/search} : @{/search/filter}"
                      method="get" hidden>
                    <input type="hidden" name="query" th:value="${query}"/>
                    <input type="hidden" name="sort" th:value="${sort}"/>
                    <th:block th:if="${searchMode == 'filter'}">
                        <input type="hidden" name="statusStr" th:value="${selectedStatus}"/>
                        <input type="hidden" name="trending" th:value="${isTrending ? 'true' : ''}"/>
                        <th:block th:each="gid : ${selectedGenres}">
                            <input type="hidden" name="genres" th:value="${gid}"/>
                        </th:block>
                    </th:block>
                    <input type="hidden" name="page" id="page-input" value="0"/>
                </form>

                <!-- Prev -->
                <button class="page-btn"
                        th:classappend="${currentPage == 0} ? ' page-btn--disabled'"
                        th:onclick="${currentPage > 0} ? 'goToPage(' + ${currentPage - 1} + ')' : 'return false'">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                         stroke-linecap="round">
                        <polyline points="15 18 9 12 15 6"/>
                    </svg>
                </button>

                <!-- First page shortcut -->
                <button th:if="${paginationStart > 0}" class="page-btn" onclick="goToPage(0)">1</button>
                <span th:if="${paginationStart > 1}" class="page-btn page-btn--ellipsis">…</span>

                <!-- Page range (0-based internally, display +1) -->
                <th:block th:each="p : ${#numbers.sequence(paginationStart, paginationEnd)}">
                    <button class="page-btn"
                            th:classappend="${p == currentPage} ? ' active'"
                            th:text="${p + 1}"
                            th:onclick="'goToPage(' + ${p} + ')'">1
                    </button>
                </th:block>

                <!-- Last page shortcut -->
                <span th:if="${paginationEnd < totalPages - 2}" class="page-btn page-btn--ellipsis">…</span>
                <button th:if="${paginationEnd < totalPages - 1}" class="page-btn"
                        th:text="${totalPages}"
                        th:onclick="'goToPage(' + (${totalPages} - 1) + ')'"></button>

                <!-- Next -->
                <button class="page-btn"
                        th:classappend="${currentPage + 1 >= totalPages} ? ' page-btn--disabled'"
                        th:onclick="${currentPage + 1 < totalPages} ? 'goToPage(' + (${currentPage + 1}) + ')' : 'return false'">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                         stroke-linecap="round">
                        <polyline points="9 18 15 12 9 6"/>
                    </svg>
                </button>
            </div>

        </section>
    </div>
    <script th:src="@{/js/searchPage.js}"></script>
</main>
</body>
</html>
