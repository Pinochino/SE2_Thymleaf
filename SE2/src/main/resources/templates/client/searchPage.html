<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/_clientLayout}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="'Search – ' + (${keyword} != null ? '\'' + ${keyword} + '\'' : 'Novel Library')">Search – Novel Library</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="src/main/resources/static/css/search.css"/>
</head>

<body>
<main layout:fragment="content">
  <div class="search-wrap">

    <!-- ══════════════════════════════
         FILTER SECTION
    ══════════════════════════════ -->
    <section id="filter-section">
      <form id="filter-form" th:action="@{/search}" method="get">

        <!-- preserve keyword across filter submits -->
        <input type="hidden" name="keyword" th:value="${keyword}"/>
        <input type="hidden" name="page"    value="0"/>
        <input type="hidden" name="size"    th:value="${size}"/>

        <!-- hidden field updated by JS when a pill is clicked -->
        <input type="hidden" id="status-input-mobile"  name="statuses" th:value="${selectedStatuses != null and !selectedStatuses.isEmpty() ? selectedStatuses[0].name() : ''}"/>

        <!-- ── MOBILE panel ─────────────────────────────── -->
        <div id="filter-mobile">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
            <span class="filter-title">FILTERS</span>
            <button type="button" class="btn-reset" onclick="resetFilters()">Reset</button>
          </div>

          <!-- Trending -->
          <label class="cb-wrap" style="margin-bottom:10px;">
            <input type="checkbox" name="trending" value="true"
                   th:checked="${trending != null and trending}">
            <span class="cb-box"></span>
            <span class="cb-label">Trending</span>
          </label>

          <!-- Genre -->
          <div style="margin-bottom:10px;">
            <p class="filter-group-label">Genre</p>
            <div class="genre-row">
              <label class="cb-wrap" th:each="genre : ${allGenres}">
                <input type="checkbox" name="genres" th:value="${genre.name}"
                       th:checked="${selectedGenres != null and selectedGenres.contains(genre.name)}">
                <span class="cb-box"></span>
                <span class="cb-label" th:text="${genre.name}">Genre</span>
              </label>
            </div>
          </div>

          <!-- Status pills -->
          <div style="margin-bottom:10px;">
            <p class="filter-group-label">Status</p>
            <div style="display:flex;flex-wrap:wrap;gap:7px;">
              <button type="button" class="status-pill"
                      th:classappend="${selectedStatuses == null or selectedStatuses.isEmpty()} ? ' active' : ''"
                      data-value="" onclick="selectPill(this,'mobile')">Any</button>
              <button type="button" class="status-pill"
                      th:classappend="${selectedStatuses != null and selectedStatuses.contains(T(com.example.SE2.constants.NovelStatus).ONGOING)} ? ' active' : ''"
                      data-value="ONGOING" onclick="selectPill(this,'mobile')">Ongoing</button>
              <button type="button" class="status-pill"
                      th:classappend="${selectedStatuses != null and selectedStatuses.contains(T(com.example.SE2.constants.NovelStatus).COMPLETED)} ? ' active' : ''"
                      data-value="COMPLETED" onclick="selectPill(this,'mobile')">Completed</button>
              <button type="button" class="status-pill"
                      th:classappend="${selectedStatuses != null and selectedStatuses.contains(T(com.example.SE2.constants.NovelStatus).HIATUS)} ? ' active' : ''"
                      data-value="HIATUS" onclick="selectPill(this,'mobile')">Hiatus</button>
            </div>
          </div>

          <button type="submit" class="btn-apply">Apply Filters</button>
        </div>

        <!-- ── DESKTOP panel ─────────────────────────────── -->
        <div id="filter-desktop">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.1rem;">
            <span class="filter-title">FILTERS</span>
            <button type="button" class="btn-reset" onclick="resetFilters()">Reset</button>
          </div>

          <!-- Trending -->
          <label class="cb-wrap" style="margin-bottom:1rem;">
            <input type="checkbox" name="trending" value="true"
                   th:checked="${trending != null and trending}">
            <span class="cb-box"></span>
            <span class="cb-label">Trending</span>
          </label>

          <hr class="filter-divider">

          <!-- Genre -->
          <div style="margin-bottom:1rem;">
            <p class="filter-group-label">Genre</p>
            <div style="display:flex;flex-direction:column;gap:9px;">
              <label class="cb-wrap" th:each="genre : ${allGenres}">
                <input type="checkbox" name="genres" th:value="${genre.name}"
                       th:checked="${selectedGenres != null and selectedGenres.contains(genre.name)}">
                <span class="cb-box"></span>
                <span class="cb-label" th:text="${genre.name}">Genre</span>
              </label>
            </div>
          </div>

          <hr class="filter-divider">

          <!-- Status pills -->
          <div style="margin-bottom:1.1rem;">
            <p class="filter-group-label">Status</p>
            <div style="display:flex;flex-wrap:wrap;gap:7px;">
              <button type="button" class="status-pill"
                      th:classappend="${selectedStatuses == null or selectedStatuses.isEmpty()} ? ' active' : ''"
                      data-value="" onclick="selectPill(this,'desktop')">Any</button>
              <button type="button" class="status-pill"
                      th:classappend="${selectedStatuses != null and selectedStatuses.contains(T(com.example.SE2.constants.NovelStatus).ONGOING)} ? ' active' : ''"
                      data-value="ONGOING" onclick="selectPill(this,'desktop')">Ongoing</button>
              <button type="button" class="status-pill"
                      th:classappend="${selectedStatuses != null and selectedStatuses.contains(T(com.example.SE2.constants.NovelStatus).COMPLETED)} ? ' active' : ''"
                      data-value="COMPLETED" onclick="selectPill(this,'desktop')">Completed</button>
              <button type="button" class="status-pill"
                      th:classappend="${selectedStatuses != null and selectedStatuses.contains(T(com.example.SE2.constants.NovelStatus).HIATUS)} ? ' active' : ''"
                      data-value="HIATUS" onclick="selectPill(this,'desktop')">Hiatus</button>
            </div>
          </div>

          <button type="submit" class="btn-apply">Apply Filters</button>
        </div>

      </form>
    </section>

    <!-- ══════════════════════════════
         RESULTS SECTION
    ══════════════════════════════ -->
    <section id="results">

      <!-- Header -->
      <div class="results-header">
        <div>
          <h1 class="results-title">
            Search Results:
            <span style="color:var(--accent2);"
                  th:text="${keyword != null and !#strings.isEmpty(keyword)} ? '\'' + ${keyword} + '\'' : 'All Novels'">
              'All Novels'
            </span>
          </h1>
          <p class="results-count">
            Found
            <span th:text="${totalItems}">0</span>
            result<span th:if="${totalItems != 1}">s</span>
          </p>
        </div>

        <!-- Sort form -->
        <form th:action="@{/search}" method="get" class="results-sort">
          <input type="hidden" name="keyword"  th:value="${keyword}"/>
          <input type="hidden" name="trending" th:value="${trending}"/>
          <input type="hidden" name="page"     value="0"/>
          <input type="hidden" name="size"     th:value="${size}"/>
          <th:block th:each="g : ${selectedGenres}">
            <input type="hidden" name="genres" th:value="${g}"/>
          </th:block>
          <th:block th:each="s : ${selectedStatuses}">
            <input type="hidden" name="statuses" th:value="${s}"/>
          </th:block>
          <span class="results-sort-label">SORT BY:</span>
          <select class="sort-select" name="sort" onchange="this.form.submit()">
            <option value="desc" th:selected="${sort == 'desc' or sort == null}">Rating ↓</option>
            <option value="asc"  th:selected="${sort == 'asc'}">Rating ↑</option>
          </select>
        </form>
      </div>

      <!-- ── Novel list ───────────────────────────────── -->

      <!-- Empty state -->
      <div class="empty-state" th:if="${novels == null or novels.isEmpty()}">
        <p class="empty-state-title">No novels found</p>
        <p class="empty-state-sub">Try adjusting your filters or search with a different keyword.</p>
      </div>

      <!-- Results grid -->
      <div id="novel-list" th:if="${novels != null and !novels.isEmpty()}">
        <div class="novel-card" th:each="novel : ${novels}">

          <!-- Cover image -->
          <div class="card-cover">
            <div class="card-cover-inner">
              <div class="card-cover-placeholder" th:if="${novel.coverImgUrl == null or #strings.isEmpty(novel.coverImgUrl)}">
                📖
              </div>
              <img th:if="${novel.coverImgUrl != null and !#strings.isEmpty(novel.coverImgUrl)}"
                   th:src="${novel.coverImgUrl}"
                   th:alt="${novel.title}"
                   loading="lazy"/>
            </div>
          </div>

          <!-- Body -->
          <div class="card-body">
            <div class="card-head-row">
              <div>
                <!-- Title -->
                <a class="card-title"
                   th:href="@{/novels/{id}(id=${novel.publicId})}"
                   th:text="${novel.title}">Novel Title</a>

                <!-- Meta: author · rating -->
                <div class="card-meta">
                  <span th:text="${novel.author}">Author</span>
                  <span class="card-meta-dot"></span>
                  <span th:text="${novel.averageRating != null} ? '★ ' + ${#numbers.formatDecimal(novel.averageRating, 1, 1)} : '★ N/A'">★ 4.5</span>
                </div>
              </div>

              <!-- Status badge -->
              <span class="card-status-badge"
                    th:classappend="${novel.status?.name() == 'ONGOING'}   ? ' badge-ongoing'   :
                                    (${novel.status?.name() == 'COMPLETED'} ? ' badge-completed' :
                                    (${novel.status?.name() == 'HIATUS'}    ? ' badge-hiatus'    : ' badge-completed'))"
                    th:text="${novel.status}">ONGOING</span>
            </div>

            <!-- Description (desktop only via CSS) -->
            <p class="card-description" th:text="${novel.description}">Description goes here...</p>

            <!-- Actions -->
            <div class="card-actions">
              <a class="btn-read"
                 th:href="@{/novels/{id}(id=${novel.publicId})}">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
                  <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
                </svg>
                Read
              </a>
              <button class="btn-save"
                      th:data-novel-id="${novel.id}"
                      onclick="toggleSave(this)">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
                </svg>
                <span>Save</span>
              </button>
            </div>
          </div>

        </div>
      </div>

      <!-- ── Pagination ──────────────────────────────── -->
      <div class="pagination-row" th:if="${totalPages != null and totalPages > 1}">

        <!-- hidden form for page navigation -->
        <form id="page-form" th:action="@{/search}" method="get" style="display:none;">
          <input type="hidden" name="keyword"  th:value="${keyword}"/>
          <input type="hidden" name="sort"     th:value="${sort}"/>
          <input type="hidden" name="trending" th:value="${trending}"/>
          <input type="hidden" name="size"     th:value="${size}"/>
          <th:block th:each="g : ${selectedGenres}">
            <input type="hidden" name="genres" th:value="${g}"/>
          </th:block>
          <th:block th:each="s : ${selectedStatuses}">
            <input type="hidden" name="statuses" th:value="${s}"/>
          </th:block>
          <input type="hidden" name="page" id="page-input" value="0"/>
        </form>

        <!-- Prev -->
        <button class="page-btn"
                th:disabled="${!hasPrev}"
                th:style="${!hasPrev} ? 'opacity:0.3;cursor:default;' : ''"
                th:onclick="${hasPrev} ? 'goToPage(' + (currentPage - 1) + ')' : 'return false'">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
        </button>

        <!-- Page buttons -->
        <th:block th:each="p : ${#numbers.sequence(0, totalPages - 1)}">
          <button class="page-btn"
                  th:classappend="${p == currentPage} ? ' active' : ''"
                  th:text="${p + 1}"
                  th:onclick="'goToPage(' + ${p} + ')'">1</button>
        </th:block>

        <!-- Next -->
        <button class="page-btn"
                th:disabled="${!hasNext}"
                th:style="${!hasNext} ? 'opacity:0.3;cursor:default;' : ''"
                th:onclick="${hasNext} ? 'goToPage(' + (currentPage + 1) + ')' : 'return false'">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <polyline points="9 18 15 12 9 6"/>
          </svg>
        </button>

      </div>

    </section>
  </div>
</main>

<script>
  function goToPage(n) {
    document.getElementById('page-input').value = n;
    document.getElementById('page-form').submit();
  }

  function selectPill(el, panel) {
    const inputId = panel === 'mobile' ? 'status-input-mobile' : 'status-input-desktop';
    el.closest('div').querySelectorAll('.status-pill').forEach(p => p.classList.remove('active'));
    el.classList.add('active');
    const input = document.getElementById(inputId);
    if (input) input.value = el.dataset.value || '';
  }

  function resetFilters() {
    document.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
    document.querySelectorAll('.status-pill').forEach((p, i) => p.classList.toggle('active', i === 0));
    document.querySelectorAll('#status-input-mobile, #status-input-desktop').forEach(inp => inp.value = '');
  }

  const csrfToken  = document.querySelector('meta[name="_csrf"]')?.content;
  const csrfHeader = document.querySelector('meta[name="_csrf_header"]')?.content;

  async function toggleSave(btn) {
    const novelId = btn.dataset.novelId;
    const isSaved = btn.classList.contains('saved');
    try {
      const headers = { 'Content-Type': 'application/json' };
      if (csrfToken && csrfHeader) headers[csrfHeader] = csrfToken;
      const res = await fetch('/favorites/toggle', {
        method: 'POST', headers,
        body: JSON.stringify({ novelId, action: isSaved ? 'remove' : 'add' })
      });
      if (!res.ok) throw new Error('failed');
      btn.classList.toggle('saved');
      const nowSaved = btn.classList.contains('saved');
      btn.querySelector('svg').setAttribute('fill', nowSaved ? 'currentColor' : 'none');
      btn.querySelector('span').textContent = nowSaved ? 'Saved' : 'Save';
    } catch (e) {
      console.error('toggleSave:', e);
    }
  }
</script>
</body>
</html>
