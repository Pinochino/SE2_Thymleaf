<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/_clientLayout}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="'Search – ' + (${query} != null ? '\'' + ${query} + '\'' : 'Novel Library')">Search – Novel Library</title>
  <link rel="stylesheet" th:href="@{/css/searchpage.css}"/>

</head>

<body>
<main layout:fragment="content">
  <div class="search-wrap">
    <section id="filter-section">
      <form id="filter-form" th:action="@{/search}" method="get">
        <input type="hidden" name="query" th:value="${query}" />
        <input type="hidden" id="status-input" name="status" th:value="${selectedStatus ?: 'any'}" />

        <!-- ── MOBILE panel ── -->
        <div id="filter-mobile">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
            <span class="filter-title">FILTERS</span>
            <button type="button" class="btn-reset" onclick="resetFilters()">Reset</button>
          </div>
          <label class="cb-wrap" style="margin-bottom:10px;">
            <input type="checkbox" name="trending" value="true" th:checked="${isTrending}">
            <span class="cb-box"></span><span class="cb-label">Trending</span>
          </label>
          <div style="margin-bottom:10px;">
            <p class="filter-group-label">Genre</p>
            <div class="genre-row">
              <label class="cb-wrap" th:each="genre : ${genres}">
                <input type="checkbox" name="genres" th:value="${genre.id}"
                       th:checked="${selectedGenres != null and selectedGenres.contains(genre.id)}">
                <span class="cb-box"></span>
                <span class="cb-label" th:text="${genre.name}">Genre</span>
              </label>
            </div>
          </div>
          <div style="margin-bottom:10px;">
            <p class="filter-group-label">Status</p>
            <div style="display:flex;flex-wrap:wrap;gap:7px;">
              <button type="button" class="status-pill" th:classappend="${(selectedStatus==null or selectedStatus=='any')}?' active':''" data-value="any"      onclick="selectPill(this)">Any</button>
              <button type="button" class="status-pill" th:classappend="${selectedStatus=='hiatus'}   ?' active':''" data-value="hiatus"    onclick="selectPill(this)">Hiatus</button>
              <button type="button" class="status-pill" th:classappend="${selectedStatus=='completed'}?' active':''" data-value="completed" onclick="selectPill(this)">Completed</button>
              <button type="button" class="status-pill" th:classappend="${selectedStatus=='ongoing'}  ?' active':''" data-value="ongoing"   onclick="selectPill(this)">Ongoing</button>
            </div>
          </div>
          <button type="submit" class="btn-apply">Apply Filters</button>
        </div>

        <!-- ── DESKTOP panel ── -->
        <div id="filter-desktop">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.1rem;">
            <span class="filter-title">FILTERS</span>
            <button type="button" class="btn-reset" onclick="resetFilters()">Reset</button>
          </div>
          <label class="cb-wrap" style="margin-bottom:1rem;">
            <input type="checkbox" name="trending" value="true" th:checked="${isTrending}">
            <span class="cb-box"></span><span class="cb-label">Trending</span>
          </label>
          <hr class="filter-divider">
          <div style="margin-bottom:1rem;">
            <p class="filter-group-label">Genre</p>
            <div style="display:flex;flex-direction:column;gap:9px;">
              <label class="cb-wrap" th:each="genre : ${genres}">
                <input type="checkbox" name="genres" th:value="${genre.id}"
                       th:checked="${selectedGenres != null and selectedGenres.contains(genre.id)}">
                <span class="cb-box"></span>
                <span class="cb-label" th:text="${genre.name}">Genre</span>
              </label>
            </div>
          </div>
          <hr class="filter-divider">
          <div style="margin-bottom:1.1rem;">
            <p class="filter-group-label">Status</p>
            <div style="display:flex;flex-wrap:wrap;gap:7px;">
              <button type="button" class="status-pill" th:classappend="${(selectedStatus==null or selectedStatus=='any')}?' active':''" data-value="any"      onclick="selectPill(this)">Any</button>
              <button type="button" class="status-pill" th:classappend="${selectedStatus=='completed'}?' active':''" data-value="completed" onclick="selectPill(this)">Completed</button>
              <button type="button" class="status-pill" th:classappend="${selectedStatus=='ongoing'}  ?' active':''" data-value="ongoing"   onclick="selectPill(this)">Ongoing</button>
              <button type="button" class="status-pill" th:classappend="${selectedStatus=='hiatus'}   ?' active':''" data-value="hiatus"    onclick="selectPill(this)">Hiatus</button>
            </div>
          </div>
          <button type="submit" class="btn-apply">Apply Filters</button>
        </div>
      </form>
    </section>


    <section id="results">
      <div class="results-header">
        <div>
          <h1 class="results-title">
            Search Results:
            <span style="color:var(--accent2);"
                  th:text="${query != null and !#strings.isEmpty(query)} ? '\'' + ${query} + '\'' : 'All Novels'">'Epic Fantasy'</span>
          </h1>
          <p style="font-size:0.8rem;color:var(--lw);margin-top:5px;">
            Found
            <span th:text="${#numbers.formatInteger(totalResults, 1, 'COMMA')}">1,240</span>
            result<span th:if="${totalResults != 1}">s</span> for your query in all categories.
          </p>
        </div>
        <form th:action="@{/search}" method="get" style="display:flex;align-items:center;gap:8px;flex-shrink:0;margin-top:4px;">
          <input type="hidden" name="query"    th:value="${query}" />
          <input type="hidden" name="status"   th:value="${selectedStatus}" />
          <input type="hidden" name="trending" th:value="${isTrending}" />
          <th:block th:each="gid : ${selectedGenres}"><input type="hidden" name="genres" th:value="${gid}" /></th:block>
          <input type="hidden" name="page" value="1" />
          <span style="font-size:0.68rem;font-weight:700;letter-spacing:.12em;color:var(--lw);">SORT BY:</span>
          <select class="sort-select" name="sort" onchange="this.form.submit()">
            <option value="asc"  th:selected="${sort=='asc'}">Ascending</option>
            <option value="desc" th:selected="${sort=='desc'}">Descending</option>
          </select>
        </form>
      </div>

      <div id="novel-list" th:if="${searchedNovels != null and !searchedNovels.isEmpty()}">
        <div class="novel-card" th:each="novel : ${searchedNovels}">
          <div class="card-cover">
            <div class="card-cover-inner" th:if="${novel.coverImgUrl != null}" th:style="'background-image:url(' + ${novel.coverImgUrl} + ');background-size:cover;background-position:center;'"></div>
            <div class="card-cover-inner" th:if="${novel.coverImgUrl == null}" style="background:linear-gradient(160deg,#1e3a5a 0%,#2a5a7a 50%,#182840 100%);">
              <span style="font-family:var(--font-head);font-size:0.48rem;color:rgba(255,255,255,.22);text-align:center;padding:0 10px;line-height:1.7;" th:text="${novel.title}"></span>
            </div>
          </div>
          <div class="card-body">
            <div class="card-head-row">
              <a th:href="@{/novels/information/{publicId}(publicId=${novel.publicId})}" class="card-title" th:text="${novel.title}">Title</a>
              <span class="card-status-badge" th:text="${novel.status}" th:classappend="${novel.status == 'Completed' ? ' badge-completed' : ' badge-new'}">Status</span>
            </div>
            <div class="card-meta">
              <span style="display:flex;align-items:center;gap:5px;">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 4-7 8-7s8 3 8 7"/></svg>
                <span th:text="${novel.author ?: 'Unknown'}">Author</span>
              </span>
              <span th:if="${novel.averageRating != null and novel.averageRating > 0}" style="display:flex;align-items:center;gap:4px;">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="#f59e0b" stroke="#f59e0b" stroke-width="1"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                <span style="color:#e2e8f0;font-weight:600;" th:text="${novel.averageRating}">4.8</span>
              </span>
            </div>
            <div class="card-genres" th:if="${novel.genres != null and !novel.genres.isEmpty()}">
              <span th:each="g : ${novel.genres}" th:text="${g.name}" style="font-size:0.68rem;color:var(--accent2);background:rgba(63,103,232,0.1);border:1px solid rgba(63,103,232,0.25);border-radius:4px;padding:2px 7px;"></span>
            </div>
            <p class="card-description" th:if="${novel.description != null}" th:text="${novel.description.length() > 200 ? novel.description.substring(0, 200) + '...' : novel.description}">Description</p>
            <div class="card-actions">
              <a th:href="@{/novels/information/{publicId}(publicId=${novel.publicId})}" class="btn-read">
                <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
                Read Now
              </a>
            </div>
          </div>
        </div>
      </div>

      <div th:if="${searchedNovels != null and searchedNovels.isEmpty()}" style="text-align:center;padding:3rem 1rem;">
        <p style="font-size:1.1rem;color:var(--lw);">No novels found<span th:if="${selectedGenre != null}"> for genre <strong th:text="${selectedGenre}" style="color:var(--accent2);"></strong></span>.</p>
        <a th:href="@{/search}" style="color:var(--accent2);font-size:0.85rem;margin-top:0.5rem;display:inline-block;">View all novels</a>
      </div>

      <div th:replace="~{fragments/client/pagination :: pagination}"></div>

    </section>
  </div>
</main>

<script>
  function selectPill(el) {
    el.closest('div').querySelectorAll('.status-pill').forEach(p => p.classList.remove('active'));
    el.classList.add('active');
    document.querySelectorAll('#status-input').forEach(inp => inp.value = el.dataset.value || 'any');
  }
  function resetFilters() {
    document.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
    document.querySelectorAll('.status-pill').forEach((p, i) => p.classList.toggle('active', i === 0));
    document.querySelectorAll('#status-input').forEach(inp => inp.value = 'any');
  }
  const csrfToken  = document.querySelector('meta[name="_csrf"]')?.content;
  const csrfHeader = document.querySelector('meta[name="_csrf_header"]')?.content;
  async function toggleSave(btn) {
    const novelId = btn.dataset.novelId;
    const isSaved = btn.classList.contains('saved');
    try {
      const headers = { 'Content-Type': 'application/json' };
      if (csrfToken && csrfHeader) headers[csrfHeader] = csrfToken;
      const res = await fetch('/favorites/toggle', {
        method: 'POST', headers,
        body: JSON.stringify({ novelId, action: isSaved ? 'remove' : 'add' })
      });
      if (!res.ok) throw new Error('failed');
      btn.classList.toggle('saved');
      const nowSaved = btn.classList.contains('saved');
      btn.querySelector('svg').setAttribute('fill', nowSaved ? 'currentColor' : 'none');
      btn.querySelector('span').textContent = nowSaved ? 'Saved' : 'Save';
    } catch(e) { console.error('toggleSave:', e); }
  }
</script>
</body>
</html>
