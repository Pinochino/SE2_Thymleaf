<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/_clientLayout}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Favourited Novels</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;700&family=Noto+Serif:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
<div layout:fragment="content">
    <section class="min-h-screen bg-[#111621] text-[#f1f5f9] py-8">

        <!-- Tab Navigation (Shared layout) -->
        <div th:replace="~{client/user/fragments/_profileNavbar :: navbar('favorite-novels')}"></div>

        <!-- ==================== FAVOURITED NOVELS TAB (Now main content) ==================== -->
        <div class="max-w-[880px] mx-auto px-8 max-sm:px-3">
            <!-- Check if there are no favourite novels -->
            <div th:if="${favoriteNovels == null or favoriteNovels.empty}" class="text-center py-10">
                <p class="text-[16px] text-[#94a3b8] font-['Noto_Sans']">You haven't favourited any novels yet.</p>
            </div>

            <!-- Novel Cards Grid: 4col desktop, 3col tablet, 2col mobile -->
            <div th:if="${favoriteNovels != null and !favoriteNovels.empty}" class="grid grid-cols-4 max-[1024px]:grid-cols-3 max-sm:grid-cols-2 gap-[24px] max-sm:gap-[16px]">

                <!-- Cards rendered dynamically -->
                <div th:each="favorite : ${favoriteNovels}" class="group">
                    <div class="aspect-[3/4] bg-[#1e293b] rounded-[12px] overflow-hidden relative">
                        <!-- Use novel thumbnail if available, else fallback gradient -->
                        <img th:if="${favorite.novel.coverImgUrl != null}" th:src="${favorite.novel.coverImgUrl}" th:alt="${favorite.novel.title}" class="w-full h-full object-cover">
                        <div th:unless="${favorite.novel.coverImgUrl != null}" class="w-full h-full bg-gradient-to-b from-slate-700 to-[#1e293b]"></div>
                    </div>
                    <a th:href="@{/novels/information/{publicId}(publicId=${favorite.novel.publicId})}">
                        <h3 class="mt-2 text-[16px] font-['Noto_Serif'] font-medium text-[#f1f5f9] leading-tight" th:text="${favorite.novel.title}">Novel Title</h3>
                    </a>
                    <p class="text-[12px] font-['Noto_Serif'] text-[#94a3b8] mt-0.5" th:text="${favorite.novel.author}">Author Name</p>
                    <form th:action="@{/user/favorite-novels/remove/{id}(id=${favorite.id})}" method="post">
                        <button type="submit"
                                class="text-[11px] tracking-[0.55px] text-[rgba(239,68,68,0.8)] mt-1 uppercase font-['Noto_Sans'] font-bold hover:text-red-400 transition">
                            REMOVE
                        </button>
                    </form>
                </div>

            </div>

            <!-- Pagination -->
            <div th:replace="~{fragments/client/pagination :: pagination}"></div>
        </div>
    </section>
</div>
</body>
</html>
