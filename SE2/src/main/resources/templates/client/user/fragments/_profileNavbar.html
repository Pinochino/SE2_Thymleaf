<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<div th:fragment="navbar(activeTab)" class="max-w-[880px] mx-auto px-8 max-sm:px-4">
    <div class="flex gap-8 max-sm:gap-4 border-b border-[#2d3446] mb-8 max-sm:overflow-x-auto max-sm:scrollbar-none">
        <a th:href="@{/user/profile}"
           class="pb-3 font-['Noto_Sans'] font-bold text-[14px] max-sm:text-[12px] tracking-[0.35px] whitespace-nowrap transition-colors"
           th:classappend="${activeTab == 'profile'} ? 'text-[#144bb8] border-b-2 border-[#144bb8]' : 'text-[#94a3b8] hover:text-[#f1f5f9]'">
            User Info
        </a>
        <a th:href="@{/user/favorite-novels}"
           class="pb-3 font-['Noto_Sans'] font-bold text-[14px] max-sm:text-[12px] tracking-[0.35px] whitespace-nowrap transition-colors"
           th:classappend="${activeTab == 'favorite-novels'} ? 'text-[#144bb8] border-b-2 border-[#144bb8]' : 'text-[#94a3b8] hover:text-[#f1f5f9]'">
            Favourited Novels
        </a>
        <a th:href="@{/user/translations}"
           class="pb-3 font-['Noto_Sans'] font-bold text-[14px] max-sm:text-[12px] tracking-[0.35px] whitespace-nowrap transition-colors"
           th:classappend="${activeTab == 'translations'} ? 'text-[#144bb8] border-b-2 border-[#144bb8]' : 'text-[#94a3b8] hover:text-[#f1f5f9]'">
            Translation Contributions
        </a>
    </div>
</div>
</html>
