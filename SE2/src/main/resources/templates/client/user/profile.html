<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/_clientLayout}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;700&family=Noto+Serif:wght@400;500;700&display=swap"
          rel="stylesheet">
</head>
<body>
<div layout:fragment="content">
    <section class="min-h-screen bg-[#111621] text-[#f1f5f9] py-8">
        <div th:replace="~{client/user/fragments/_profileNavbar :: navbar('profile')}"></div>
        <div class="max-w-[880px] mx-auto px-8 max-sm:px-4">
            <div class="flex items-center gap-6 py-10 mb-6 max-sm:flex-col max-sm:text-center max-sm:py-6 max-sm:mb-4">
                <div class="relative flex-shrink-0">
                    <div class="w-[128px] h-[128px] rounded-full bg-[#f2cfc1] flex items-center justify-center border-4 border-[rgba(20,75,184,0.2)] overflow-hidden">
                        <img id="avatarImg"
                             th:if="${user.avatarUrl != null && !user.avatarUrl.isEmpty()}"
                             th:src="${user.avatarUrl}"
                             alt="Avatar" class="w-full h-full object-cover"
                             onerror="this.style.display='none'; document.getElementById('avatarLetter').style.display='flex';">
                        <div id="avatarLetter"
                             th:style="${user.avatarUrl != null && !user.avatarUrl.isEmpty()} ? 'display:none' : 'display:flex'"
                             class="w-full h-full items-center justify-center text-[#144bb8] text-[56px] font-serif font-bold uppercase"
                             th:text="${user.email != null && !user.email.isEmpty()} ? ${#strings.substring(user.email, 0, 1)} : '?'"></div>
                    </div>
                    <button onclick="document.getElementById('avatarModal').classList.remove('hidden')"
                            class="absolute bottom-1 right-1 w-7 h-7 rounded-full bg-[#144bb8] text-white text-[12px] flex items-center justify-center hover:bg-[#1a5ce0] transition">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24"
                             stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                  d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/>
                        </svg>
                    </button>
                </div>
                <div class="max-sm:flex max-sm:flex-col max-sm:items-center">
                    <h1 class="text-[30px] font-serif text-[#f8fafc] font-semibold leading-tight"
                        th:text="${user.username}"></h1>
                    <p class="text-[16px] text-[#94a3b8] mt-1">Avid reader and occasional translator</p>
                    <span class="inline-block mt-3 text-[12px] bg-[rgba(20,75,184,0.1)] text-[#144bb8] px-4 py-1.5 rounded-full border border-[rgba(20,75,184,0.2)] font-['Noto_Sans'] font-bold">
                        Member since <span th:text="${#temporals.format(user.createdAt, 'dd/MM/yyyy')}"></span>
                    </span>
                </div>
            </div>

            <div>
                <h2 class="text-[20px] font-serif text-[#f1f5f9] mb-6 pb-3 border-b border-[#2d3446] flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-5 text-[#94a3b8]" fill="none"
                         viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round"
                              d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                    </svg>
                    Account Details
                </h2>

                <form th:action="@{/user/profile/save}" method="post" class="space-y-6">
                    <div class="flex flex-col sm:grid sm:grid-cols-2 gap-5 sm:gap-6 mb-5 sm:mb-6">
                        <div class="order-2 sm:order-1">
                            <label class="block text-[14px] text-[#cbd5e1] mb-2 font-['Noto_Sans'] font-bold">Username</label>
                            <input type="text" name="username" th:value="${user.username}"
                                   class="w-full bg-[#1a1f2e] border border-[#2d3446] rounded-[8px] p-[13px] text-[#f1f5f9] placeholder-[#475569] focus:outline-none focus:ring-2 focus:ring-[#144bb8] text-[16px]">
                        </div>
                        <div class="order-1 sm:order-2">
                            <label class="block text-[14px] text-[#cbd5e1] mb-2 font-['Noto_Sans'] font-bold">First
                                Name</label>
                            <input type="text" name="firstName" th:value="${user.firstName}"
                                   class="w-full bg-[#1a1f2e] border border-[#2d3446] rounded-[8px] p-[13px] text-[#f1f5f9] placeholder-[#475569] focus:outline-none focus:ring-2 focus:ring-[#144bb8] text-[16px]">
                        </div>
                        <div class="order-3">
                            <label class="block text-[14px] text-[#cbd5e1] mb-2 font-['Noto_Sans'] font-bold">Last
                                Name</label>
                            <input type="text" name="lastName" th:value="${user.lastName}"
                                   class="w-full bg-[#1a1f2e] border border-[#2d3446] rounded-[8px] p-[13px] text-[#f1f5f9] placeholder-[#475569] focus:outline-none focus:ring-2 focus:ring-[#144bb8] text-[16px]">
                        </div>
                        <div class="order-4 sm:col-span-2">
                            <label class="block text-[14px] text-[#cbd5e1] mb-2 font-['Noto_Sans'] font-bold">Email
                                Address</label>
                            <input type="email" name="email" th:value="${user.email}"
                                   class="w-full bg-[#1a1f2e] border border-[#2d3446] rounded-[8px] p-[13px] text-[#f1f5f9] placeholder-[#475569] focus:outline-none focus:ring-2 focus:ring-[#144bb8] text-[16px]">
                        </div>
                    </div>

                    <div class="pt-6 border-t border-[#2d3446] flex justify-end max-sm:justify-center gap-3">
                        <button type="button"
                                class="px-6 py-2.5 rounded-[8px] border border-[#2d3446] text-[#94a3b8] hover:bg-[#1a1f2e] transition text-[14px] font-['Noto_Sans']">
                            Cancel
                        </button>
                        <button type="submit"
                                class="px-6 py-2.5 rounded-[8px] bg-[#144bb8] text-white hover:bg-[#1a5ce0] transition font-bold text-[14px] font-['Noto_Sans']">
                            Save Changes
                        </button>

                    </div>
                </form>
            </div>
        </div>

    </section>

    <div id="avatarModal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm">
        <div class="bg-[#1a1f2e] border border-[#2d3446] rounded-2xl w-full max-w-[420px] mx-4 p-6 shadow-2xl">
            <div class="flex items-center justify-between mb-5">
                <h3 class="text-[18px] font-serif text-[#f1f5f9] font-semibold">Update Avatar</h3>
                <button type="button" onclick="document.getElementById('avatarModal').classList.add('hidden')"
                        class="text-[#94a3b8] hover:text-white transition text-xl leading-none">&times;</button>
            </div>
            <form id="avatarForm" th:action="@{/user/profile/avatar}" method="post" enctype="multipart/form-data">
                <div class="mb-4">
                    <label class="block text-[13px] text-[#cbd5e1] mb-2 font-['Noto_Sans'] font-bold">Choose image</label>
                    <input id="avatarFileInput" name="avatarFile" type="file" accept="image/*"
                           class="w-full bg-[#111621] border border-[#2d3446] rounded-lg p-3 text-[#f1f5f9] file:mr-3 file:py-1.5 file:px-3 file:rounded-md file:border-0 file:bg-[#144bb8] file:text-white file:text-[12px] file:font-bold hover:file:bg-[#1a5ce0] text-[13px] cursor-pointer">
                    <p class="text-[11px] text-[#64748b] mt-2">JPG, PNG or GIF. Max 5MB.</p>
                </div>
                <div id="avatarPreviewWrap" class="mb-5 flex justify-center">
                    <div class="w-[80px] h-[80px] rounded-full overflow-hidden border-2 border-[#2d3446] bg-[#111621]">
                        <img id="avatarPreview" src="" alt="Preview" class="w-full h-full object-cover hidden">
                        <div id="avatarPreviewPlaceholder" class="w-full h-full flex items-center justify-center text-[#475569] text-[11px]">Preview</div>
                    </div>
                </div>
                <div class="flex justify-between items-center gap-3">
                    <button type="submit" name="remove" value="true"
                            th:if="${user.avatarUrl != null && !user.avatarUrl.isEmpty()}"
                            onclick="return confirm('Remove current avatar?');"
                            class="px-4 py-2 rounded-lg border border-[#7f1d1d] text-[#fca5a5] hover:bg-[#7f1d1d]/20 transition text-[12px] font-['Noto_Sans']">Remove</button>
                    <div class="flex gap-3 ml-auto">
                        <button type="button" onclick="document.getElementById('avatarModal').classList.add('hidden')"
                                class="px-5 py-2 rounded-lg border border-[#2d3446] text-[#94a3b8] hover:bg-[#111621] transition text-[13px] font-['Noto_Sans']">Cancel</button>
                        <button type="submit"
                                class="px-5 py-2 rounded-lg bg-[#144bb8] text-white hover:bg-[#1a5ce0] transition font-bold text-[13px] font-['Noto_Sans']">Upload</button>
                    </div>
                </div>
            </form>
            <p th:if="${avatarError}" th:text="${avatarError}" class="mt-3 text-[12px] text-[#fca5a5]"></p>
        </div>
    </div>

    <script>
        var avatarFileInput = document.getElementById('avatarFileInput');
        var avatarPreview = document.getElementById('avatarPreview');
        var avatarPreviewPlaceholder = document.getElementById('avatarPreviewPlaceholder');
        var MAX_AVATAR_BYTES = 5 * 1024 * 1024; // 5MB

        if (avatarFileInput) {
            avatarFileInput.addEventListener('change', function() {
                var file = this.files && this.files[0];
                if (!file) {
                    avatarPreview.classList.add('hidden');
                    avatarPreview.src = '';
                    avatarPreviewPlaceholder.classList.remove('hidden');
                    avatarPreviewPlaceholder.textContent = 'Preview';
                    return;
                }
                if (!file.type.startsWith('image/')) {
                    this.value = '';
                    avatarPreviewPlaceholder.textContent = 'Not an image';
                    return;
                }
                if (file.size > MAX_AVATAR_BYTES) {
                    this.value = '';
                    avatarPreviewPlaceholder.textContent = 'Max 5MB';
                    return;
                }
                var reader = new FileReader();
                reader.onload = function(e) {
                    avatarPreview.src = e.target.result;
                    avatarPreview.classList.remove('hidden');
                    avatarPreviewPlaceholder.classList.add('hidden');
                };
                reader.readAsDataURL(file);
            });
        }

        // Close modal on backdrop click
        document.getElementById('avatarModal')?.addEventListener('click', function(e) {
            if (e.target === this) this.classList.add('hidden');
        });
    </script>
</div>
</body>
</html>
