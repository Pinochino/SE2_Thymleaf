<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/_clientLayout}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Translations</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;700&family=Noto+Serif:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
<div layout:fragment="content">
    <section class="min-h-screen bg-[#111621] text-[#f1f5f9] py-8">

        <div th:replace="~{client/user/fragments/_profileNavbar :: navbar('translations')}"></div>

        <div class="max-w-[880px] mx-auto px-8 max-sm:px-3">
            <div th:if="${translations == null or translations.empty}" class="text-center py-10">
                <p class="text-[16px] text-[#94a3b8] font-['Noto_Sans']">You don't have any translations yet.</p>
            </div>

            <div th:if="${translations != null and !translations.empty}" class="w-full">
                <div class="hidden sm:grid grid-cols-[minmax(0,1fr)_140px_120px_120px] gap-4 py-3 border-b border-[#2d3446] text-[#94a3b8] font-['Noto_Sans'] text-[12px] font-bold uppercase tracking-wider mb-4">
                    <div>Novel / Chapter</div>
                    <div class="text-center">Submitted</div>
                    <div class="text-center">Status</div>
                    <div class="text-right pr-4">Action</div>
                </div>

                <!-- Items Loop -->
                <div class="flex flex-col gap-4 sm:gap-0">
                    <div th:each="translation : ${translations}" class="bg-[#1e293b] sm:bg-transparent rounded-[12px] sm:rounded-none p-4 sm:p-0 sm:py-4 sm:border-b border-[#2d3446] flex flex-col sm:grid sm:grid-cols-[minmax(0,1fr)_140px_120px_120px] gap-3 sm:gap-4 sm:items-center hover:bg-[rgba(30,41,59,0.5)] transition">

                        <!-- Col 1: Novel Info -->
                        <div>
                            <div class="flex items-center gap-3 mb-2 sm:hidden text-[12px] text-[#94a3b8] font-['Noto_Sans'] font-bold uppercase">
                                <span>Novel / Chapter</span>
                            </div>
                            <h3 class="text-[16px] font-['Noto_Serif'] font-medium text-[#f1f5f9] leading-tight" th:text="${translation.chapter.novel.title}">Novel Title</h3>
                            <p class="text-[14px] text-[#94a3b8] mt-1" th:text="'Chapter ' + ${translation.chapter.chapterNumber} + (${translation.chapter.title != null ? ' - ' + translation.chapter.title : ''})">Chapter</p>
                        </div>

                        <!-- Col 2: Submitted Date -->
                        <div class="sm:text-center text-[14px] text-[#cbd5e1] font-['Noto_Sans'] flex justify-between sm:block">
                            <span class="sm:hidden text-[12px] text-[#94a3b8] font-bold uppercase">Submitted:</span>
                            <span th:text="${translation.createdAt != null ? #temporals.format(translation.createdAt, 'MMM dd') : 'N/A'}"></span>
                        </div>

                        <!-- Col 3: Status -->
                        <div class="sm:text-center flex justify-between sm:block">
                            <span class="sm:hidden text-[12px] text-[#94a3b8] font-bold uppercase">Status:</span>
                            <span class="inline-block px-3 py-1 rounded-full text-[12px] font-bold"
                                  th:classappend="${translation.status.name() == 'PENDING'} ? 'bg-[rgba(234,179,8,0.1)] text-[#eab308]' :
                                                  (${translation.status.name() == 'COMPLETED'} ? 'bg-[rgba(34,197,94,0.1)] text-[#22c55e]' :
                                                  (${translation.status.name() == 'IN_PROGRESS'} ? 'bg-[rgba(59,130,246,0.1)] text-[#3b82f6]' :
                                                  'bg-[rgba(239,68,68,0.1)] text-[#ef4444]'))">
                                <span th:text="${translation.status.name()}"></span>
                            </span>
                        </div>

                        <!-- Col 4: Action -->
                        <div class="sm:text-right sm:pr-4 mt-2 sm:mt-0">
                            <a th:href="@{/user/submit-translation(novelId=${translation.chapter.novel.id}, chapterId=${translation.chapter.id})}"
                               class="inline-block w-full sm:w-auto text-center px-6 py-2 bg-[#144bb8] text-white text-[14px] rounded-[8px] hover:bg-[#1a5ce0] transition font-bold">
                                View
                            </a>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Pagination -->
            <div th:if="${totalPages != null and totalPages > 1}" class="mt-10 flex justify-center items-center gap-2">
                <a th:href="@{/user/translations(page=${currentPage > 0 ? currentPage - 1 : 0})}"
                   th:classappend="${currentPage == 0} ? 'pointer-events-none opacity-50' : ''"
                   class="w-[40px] h-[40px] rounded-[8px] bg-[#1e293b] text-[#94a3b8] flex items-center justify-center hover:bg-[#2d3446] transition text-[14px]">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
                </a>
                
                <th:block th:each="i : ${#numbers.sequence(0, totalPages - 1)}">
                    <!-- Chỉ hiển thị trang nếu nó gần currentPage (VD: cách nhau 2 trang) -->
                    <a th:if="${i >= currentPage - 2 and i <= currentPage + 2}"
                       th:href="@{/user/translations(page=${i})}"
                       class="w-[40px] h-[40px] rounded-[8px] flex items-center justify-center text-[14px] font-bold transition"
                       th:classappend="${i == currentPage} ? 'bg-[#144bb8] text-white' : 'bg-[#1e293b] text-[#94a3b8] hover:bg-[#2d3446]'">
                        <span th:text="${i + 1}"></span>
                    </a>
                </th:block>

                <a th:href="@{/user/translations(page=${currentPage < totalPages - 1 ? currentPage + 1 : totalPages - 1})}"
                   th:classappend="${currentPage >= totalPages - 1} ? 'pointer-events-none opacity-50' : ''"
                   class="w-[40px] h-[40px] rounded-[8px] bg-[#1e293b] text-[#94a3b8] flex items-center justify-center hover:bg-[#2d3446] transition text-[14px]">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>
                </a>
            </div>
        </div>
    </section>
</div>
</body>
</html>
