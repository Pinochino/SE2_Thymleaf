<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Reset Password</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Roboto', sans-serif;
        }
    </style>
</head>

<body class="bg-gray-100 py-10">

<div class="max-w-md mx-auto bg-white rounded-2xl shadow-lg overflow-hidden">

    <!-- Header -->
    <div class="bg-indigo-600 text-white text-center py-6">
        <h2 class="text-xl font-bold">🔐 Reset Password</h2>
    </div>

    <!-- Content -->
    <div class="p-6 text-gray-700">
        <p class="mb-4">Hello,</p>

        <p class="mb-4">
            You have requested to reset your password. Click the button below to proceed:
        </p>

        <!-- Button -->
        <div class="text-center my-6">
            <a th:href="${resetPasswordLink}"
               class="inline-block bg-indigo-600 hover:bg-indigo-700 text-white font-medium px-6 py-3 rounded-lg shadow transition">
                Change My Password
            </a>
        </div>

        <p class="text-sm text-gray-500">
            If you did not request this, you can safely ignore this email.
        </p>
    </div>

    <!-- Footer -->
    <div class="bg-gray-50 text-center text-sm text-gray-500 py-4">
        © 2026 Your Company
    </div>

</div>

</body>
</html>
