<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <title>Title</title>

    <link rel="stylesheet" th:href="@{/css/style.css}">
    <script src="https://cdn.tailwindcss.com"></script>
    <link
            href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap"
            rel="stylesheet"
    />
    <style>
        * {
            font-family: "DM Sans", sans-serif;
        }

        .mono {
            font-family: "DM Mono", monospace;
        }

        body {
            background-color: #f1f3f7;
        }

        /* Sidebar */
        #sidebar {
            transition: transform 0.3s ease;
        }

        #sidebar-overlay {
            display: none;
        }

        @media (max-width: 767px) {
            #sidebar {
                position: fixed;
                top: 0;
                left: 0;
                height: 100vh;
                transform: translateX(-100%);
                z-index: 50;
            }

            #sidebar.open {
                transform: translateX(0);
            }

            #sidebar-overlay.show {
                display: block;
            }
        }

        /* Nav item active */
        .nav-active {
            background: #ede9fe;
            color: #6d28d9;
            font-weight: 600;
        }

        /* Genre badges */
        .badge-fantasy {
            background: #ede9fe;
            color: #6d28d9;
        }

        .badge-xianxia {
            background: #fce7f3;
            color: #be185d;
        }

        .badge-vrmmo {
            background: #dbeafe;
            color: #1d4ed8;
        }

        .badge-romance {
            background: #fce7f3;
            color: #db2777;
        }

        .badge-adventure {
            background: #d1fae5;
            color: #065f46;
        }

        /* Status badges */
        .status-ongoing {
            background: #d1fae5;
            color: #065f46;
        }

        .status-completed {
            background: #dbeafe;
            color: #1d4ed8;
        }

        .status-hiatus {
            background: #fef9c3;
            color: #854d0e;
        }

        /* Hover row */
        .novel-row:hover {
            background: #f8f7ff;
        }

        /* Cover gradients */
        .cover-1 {
            background: linear-gradient(135deg, #7c3aed, #a855f7);
        }

        .cover-2 {
            background: linear-gradient(135deg, #f97316, #fb923c);
        }

        .cover-3 {
            background: linear-gradient(135deg, #0ea5e9, #38bdf8);
        }

        .cover-4 {
            background: linear-gradient(135deg, #ec4899, #f472b6);
        }

        .cover-5 {
            background: linear-gradient(135deg, #10b981, #34d399);
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #c4b5fd;
            border-radius: 99px;
        }

        /* Table horizontal scroll on small screens */
        .table-wrap {
            overflow-x: auto;
        }

        /* Notification dot pulse */
        @keyframes pulse {
            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.6;
            }
        }

        .notif-pulse {
            animation: pulse 2s infinite;
        }

        /* Fade in rows */
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .novel-row {
            animation: fadeUp 0.35s ease both;
        }

        .novel-row:nth-child(1) {
            animation-delay: 0.05s;
        }

        .novel-row:nth-child(2) {
            animation-delay: 0.1s;
        }

        .novel-row:nth-child(3) {
            animation-delay: 0.15s;
        }

        .novel-row:nth-child(4) {
            animation-delay: 0.2s;
        }

        .novel-row:nth-child(5) {
            animation-delay: 0.25s;
        }

        select option {
            background: #fff;
            color: #1e1b4b;
        }
    </style>
</head>
<body>

<section th:fragment="sidebar" style="height: 100vh">
    <!-- Sidebar Overlay (mobile) -->
    <div
            id="sidebar-overlay"
            class="fixed inset-0 bg-black/30 z-40 h-full"
            onclick="closeSidebar()"
    ></div>

    <!-- ===== SIDEBAR ===== -->
    <aside
            id="sidebar"
            class="w-60 bg-white flex flex-col border-r border-gray-100 shadow-sm shrink-0 h-full"
    >
        <!-- Logo -->
        <div class="px-6 py-5 border-b border-gray-100">
            <a th:href="@{/admin/novels/list}" class="flex items-center gap-2 group">
                <div
                        class="w-8 h-8 rounded-lg bg-violet-600 flex items-center justify-center shadow"
                >
                    <svg
                            class="w-5 h-5 text-white"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                            viewBox="0 0 24 24"
                    >
                        <path
                                stroke-linecap="round"
                                stroke-linejoin="round"
                                d="M12 6.042A8.967 8.967 0 006 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 016 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 016-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0018 18a8.966 8.966 0 00-6 2.292m0-14.25v14.25"
                        />
                    </svg>
                </div>
                <span
                        class="text-lg font-700 text-violet-700 tracking-tight"
                        style="font-weight: 700"
                >NRW Admin</span
                >
            </a>
        </div>

        <!-- Nav -->
        <nav class="flex-1 px-3 py-4 space-y-1">
            <a
                    th:href="@{/admin/novels/list}"
                    class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm transition-all"
            >
                <svg
                        class="w-5 h-5 text-violet-600 shrink-0"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        viewBox="0 0 24 24"
                >
                    <path
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"
                    />
                </svg>
                Manage Novels
            </a>
            <a
                    th:href="@{/admin/translations}"
                    class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm text-gray-500 hover:bg-gray-50 hover:text-gray-800 transition-all"
            >
                <svg
                        class="w-5 h-5 shrink-0"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        viewBox="0 0 24 24"
                >
                    <path
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            d="M3 5h12M9 3v2m1.048 3.938A9 9 0 0121 12.42M6.344 18.657A9 9 0 003.072 9.193m2.97 9.464L5 21l1.5-1.5"
                    />
                </svg>
                Manage Translations
            </a>
        </nav>

        <!-- Divider + System -->
        <div class="px-6 pb-2">
            <p
                    class="text-[10px] font-600 uppercase tracking-widest text-gray-400 mb-2"
                    style="font-weight: 600"
            >
                System
            </p>
            <a
                    href="#"
                    class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm text-gray-500 hover:bg-red-50 hover:text-red-600 transition-all"
            >
                <svg
                        class="w-5 h-5 shrink-0"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        viewBox="0 0 24 24"
                >
                    <path
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"
                    />
                </svg>
                Logout
            </a>
        </div>

        <!-- User -->
        <div class="px-4 py-4 border-t border-gray-100">
            <div class="flex items-center gap-3">
                <div
                        class="w-9 h-9 rounded-full bg-gradient-to-br from-violet-400 to-indigo-500 flex items-center justify-center text-white text-sm font-700 shrink-0"
                        style="font-weight: 700"
                >
                    A
                </div>
                <div class="min-w-0">
                    <p
                            class="text-sm font-600 text-gray-800 truncate"
                            style="font-weight: 600"
                    >
                        Admin User
                    </p>
                    <p class="text-xs text-violet-500 truncate">Super Admin</p>
                </div>
            </div>
        </div>
    </aside>

    <script>
        const navItems = document.querySelectorAll(".nav-item");

        navItems.forEach(item => {
            item.addEventListener("click", function () {
                navItems.forEach(i => i.classList.remove("nav-active"))

                this.classList.add("nav-active")
            })
        })
    </script>
</section>


</body>
</html>
