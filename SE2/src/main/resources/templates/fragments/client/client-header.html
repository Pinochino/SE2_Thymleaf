<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header th:fragment="header" class="navbar sticky top-0 z-40">
    <div
            class="max-w-6xl mx-auto px-4 sm:px-6 h-14 flex items-center justify-between gap-4"
    >
        <!-- Logo -->
        <a href="/home" class="flex items-center gap-2 shrink-0">
            <div
                    class="w-7 h-7 rounded-md bg-violet-600 flex items-center justify-center"
            >
                <svg
                        class="w-4 h-4 text-white"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        viewBox="0 0 24 24"
                >
                    <path
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            d="M12 6.042A8.967 8.967 0 006 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 016 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 016-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0018 18a8.966 8.966 0 00-6 2.292m0-14.25v14.25"
                    />
                </svg>
            </div>
            <span
                    class="text-white font-700 text-base tracking-tight"
                    style="font-weight: 700"
            >NRW</span
            >
        </a>

        <!-- Desktop Nav links -->
        <div class="hidden md:flex items-center gap-6">
            <a href="#" class="text-sm text-white" style="font-weight: 600"
            >Home</a
            >
            <a href="#" class="text-sm text-gray-400 hover:text-white transition"
            >Favourite</a
            >
            <a href="#" class="text-sm text-gray-400 hover:text-white transition"
            >Contribute</a
            >
        </div>

        <!-- Right: search + icons -->
        <div class="flex items-center gap-2 flex-1 md:flex-none justify-end">
            <!-- Search -->
            <div class="relative hidden sm:block w-48 lg:w-56">
                <svg
                        class="absolute left-2.5 top-1/2 -translate-y-1/2 w-3.5 h-3.5 text-gray-500 pointer-events-none"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        viewBox="0 0 24 24"
                >
                    <path
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"
                    />
                </svg>
                <input
                        type="text"
                        placeholder="Search novels..."
                        class="search-bar"
                />
                <!-- Filter icon -->
                <svg
                        class="absolute right-2.5 top-1/2 -translate-y-1/2 w-3.5 h-3.5 text-gray-500"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        viewBox="0 0 24 24"
                >
                    <path
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z"
                    />
                </svg>
            </div>
            <!-- Bell -->
            <button
                    class="p-2 rounded-lg hover:bg-white/5 transition text-gray-400 hover:text-white hidden sm:block"
            >
                <svg
                        class="w-5 h-5"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        viewBox="0 0 24 24"
                >
                    <path
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"
                    />
                </svg>
            </button>
            <!-- User avatar -->
            <div class="relative hidden sm:block">

                <!-- Avatar -->
                <div onclick="toggleUserMenu()"
                     class="w-8 h-8 rounded-full bg-gradient-to-br from-violet-500 to-indigo-600
                flex items-center justify-center text-white text-xs shrink-0 cursor-pointer"
                     style="font-weight:700">
                    U
                </div>

                <!-- Dropdown -->
                <div id="userMenu"
                     class="hidden absolute right-0 mt-2 w-40 bg-white rounded-lg shadow-lg border border-gray-200 overflow-hidden">

                    <a href="/profile"
                       class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">
                        Profile
                    </a>

                    <a href="/library"
                       class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">
                        My Library
                    </a>

                    <a href="/settings"
                       class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">
                        Settings
                    </a>

                    <div class="border-t"></div>

                    <form th:action="@{/logout}" method="post" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100" >
                        <button type="submit" >Logout</button>
                    </form>

                </div>

            </div>
            <!-- Mobile menu button -->
            <button
                    onclick="
              document.getElementById('mobile-menu').classList.toggle('open')
            "
                    class="p-2 rounded-lg hover:bg-white/5 transition text-gray-400 md:hidden"
            >
                <svg
                        class="w-5 h-5"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        viewBox="0 0 24 24"
                >
                    <path
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            d="M4 6h16M4 12h16M4 18h16"
                    />
                </svg>
            </button>
        </div>
    </div>

    <!-- Mobile menu -->
    <div
            id="mobile-menu"
            class="md:hidden border-t border-gray-800 px-4 py-3 space-y-2"
    >
        <a
                href="#"
                class="block text-sm text-white py-2"
                style="font-weight: 600"
        >Home</a
        >
        <a href="#" class="block text-sm text-gray-400 py-2">Favourite</a>
        <a href="#" class="block text-sm text-gray-400 py-2">Contribute</a>
        <div class="relative pt-2">
            <svg
                    class="absolute left-2.5 top-1/2 translate-y-px w-3.5 h-3.5 text-gray-500 pointer-events-none"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    viewBox="0 0 24 24"
            >
                <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"
                />
            </svg>
            <input
                    type="text"
                    placeholder="Search novels..."
                    class="search-bar"
            />
        </div>
    </div>

    <script>

        function toggleUserMenu() {
            const menu = document.getElementById("userMenu");
            menu.classList.toggle("hidden");
        }

        // đóng dropdown khi click ngoài
        document.addEventListener("click", function (event) {

            const avatar = event.target.closest(".relative");

            if (!avatar) {
                document.getElementById("userMenu").classList.add("hidden");
            }

        });

    </script>
</header>

</body>
</html>
