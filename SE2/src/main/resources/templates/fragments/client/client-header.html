<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
    <title>Header</title>

</head>
<body>

<header th:fragment="header">
    <div class="header-container">

        <!-- Logo -->
        <a th:href="@{/}" class="header-logo">
            <div class="header-logo-icon">
                <svg width="33" height="29" viewBox="0 0 33 29" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="2" y="4" width="12" height="21" rx="2" stroke="#7c3aed" stroke-width="2.5" fill="none"/>
                    <rect x="19" y="4" width="12" height="21" rx="2" stroke="#7c3aed" stroke-width="2.5" fill="none"/>
                    <path d="M14 8 L19 8" stroke="#7c3aed" stroke-width="2"/>
                    <path d="M14 14 L19 14" stroke="#7c3aed" stroke-width="2"/>
                    <path d="M14 20 L19 20" stroke="#7c3aed" stroke-width="2"/>
                </svg>
            </div>
            <span class="header-logo-text">NRW</span>
        </a>

        <!-- Desktop Nav -->
        <nav class="header-nav">
            <a th:href="@{/}" class="header-nav-link header-nav-link--active">Home</a>

            <!-- Genres Dropdown -->
            <div class="genres-dropdown-wrapper" id="genres-dropdown-wrapper">
                <button onclick="document.getElementById('genresDropdown').classList.toggle('hidden')"
                        class="genres-dropdown-btn">
                    Genres
                    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5"/>
                    </svg>
                </button>
                <div id="genresDropdown" class="genres-dropdown-menu hidden">
                    <a th:each="genre : ${headerGenres}"
                       th:href="@{/search(genre=${genre.name})}"
                       th:text="${#strings.capitalize(#strings.toLowerCase(genre.name.name()))}"
                       class="genres-dropdown-item"></a>
                </div>
            </div>

            <a th:if="${isLoggedIn}" th:href="@{/user/favorite-novels}"
               class="header-nav-link header-nav-link--spaced">Favourite</a>
            <a th:href="@{/user/translations}"
               class="header-nav-link header-nav-link--spaced">Contribute</a>
        </nav>

        <div class="header-spacer"></div>

        <!-- Desktop Search -->
        <form th:action="@{/search}" method="get"
              class="header-search-form"
              onsubmit="return validateSearch(this)">
            <input type="hidden" name="mode" id="desktop-search-mode" value="semantic"/>
            <input type="text" name="query" placeholder="Search novels..."
                   class="header-search-input"/>
            <div class="header-search-icon">
                <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round"
                          d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                </svg>
            </div>
            <div class="header-search-actions">
                <button type="button" id="desktop-mode-toggle"
                        class="search-mode-toggle"
                        onclick="toggleSearchMode()"
                        title="Toggle: Semantic AI / Keyword">AI
                </button>
                <a th:href="@{/search/filter}" class="search-filter-link" title="Browse with filters">
                    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round"
                              d="M10.5 6h9.75M10.5 6a1.5 1.5 0 11-3 0m3 0a1.5 1.5 0 10-3 0M3.75 6H7.5m3 12h9.75m-9.75 0a1.5 1.5 0 01-3 0m3 0a1.5 1.5 0 00-3 0m-3.75 0H7.5m9-6h3.75m-3.75 0a1.5 1.5 0 01-3 0m3 0a1.5 1.5 0 00-3 0m-9.75 0h9.75"/>
                    </svg>
                </a>
            </div>
        </form>

        <!-- Right section -->
        <div class="header-right">

            <!-- LOGGED IN -->
            <div th:if="${isLoggedIn}" style="display:flex;align-items:center;gap:0.5rem;">

                <!-- Bell + Notification Dropdown -->
                <div class="notif-wrapper" id="notification-wrapper">
                    <button onclick="toggleNotifications()" class="notif-btn">
                        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                  d="M14.857 17.082a23.848 23.848 0 005.454-1.31A8.967 8.967 0 0118 9.75v-.7V9A6 6 0 006 9v.75a8.967 8.967 0 01-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 01-5.714 0m5.714 0a3 3 0 11-5.714 0"/>
                        </svg>
                        <span id="notif-badge" class="notif-badge hidden">0</span>
                    </button>
                    <div id="notifDropdown" class="notif-dropdown hidden">
                        <div class="notif-header">
                            <span class="notif-header-title">Notifications</span>
                            <button onclick="markAllRead()" class="notif-mark-all-btn">Mark all read</button>
                        </div>
                        <div id="notif-list" class="notif-list">
                            <div class="notif-empty">No notifications</div>
                        </div>
                    </div>
                </div>

                <!-- Avatar + Dropdown -->
                <div class="avatar-wrapper" id="avatar-wrapper">
                    <button onclick="toggleUserMenu()" class="avatar-btn">
                        <div class="avatar-circle">
                            <img th:if="${loggedInAvatarUrl != null && !loggedInAvatarUrl.isEmpty()}"
                                 th:src="${loggedInAvatarUrl}" alt="Avatar"/>
                            <span th:if="${loggedInAvatarUrl == null || loggedInAvatarUrl.isEmpty()}"
                                  th:text="${loggedInUser?.substring(0,1)?.toUpperCase() ?: 'U'}">U</span>
                        </div>
                    </button>
                    <div id="userMenu" class="user-menu hidden">
                        <div class="user-menu-profile">
                            <div class="user-menu-avatar">
                                <img th:if="${loggedInAvatarUrl != null && !loggedInAvatarUrl.isEmpty()}"
                                     th:src="${loggedInAvatarUrl}" alt="Avatar"/>
                                <span th:if="${loggedInAvatarUrl == null || loggedInAvatarUrl.isEmpty()}"
                                      th:text="${loggedInUser?.substring(0,1)?.toUpperCase() ?: 'U'}">U</span>
                            </div>
                            <div>
                                <div class="user-menu-name" th:text="${loggedInUser ?: 'User'}">User</div>
                            </div>
                        </div>
                        <a th:href="@{/user/profile}" class="user-menu-link">
                            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                      d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"/>
                            </svg>
                            Profile
                        </a>
                        <a th:href="@{/search}" class="user-menu-link">
                            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                      d="M12 6.042A8.967 8.967 0 006 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 016 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 016-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0018 18a8.966 8.966 0 00-6 2.292m0-14.25v14.25"/>
                            </svg>
                            My Library
                        </a>
                        <div class="user-menu-divider"></div>
                        <form action="/logout" method="post">
                            <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}"
                                   th:value="${_csrf.token}"/>
                            <button type="submit" class="user-menu-logout-btn">
                                <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round"
                                          d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15M12 9l-3 3m0 0l3 3m-3-3h12.75"/>
                                </svg>
                                Logout
                            </button>
                        </form>
                    </div>
                </div>
            </div>

            <!-- GUEST -->
            <div th:if="${!isLoggedIn}">
                <a th:href="@{/login}" class="header-login-btn">
                    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round"
                              d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15m3 0l3-3m0 0l-3-3m3 3H9"/>
                    </svg>
                    Login
                </a>
            </div>

            <!-- Mobile: search toggle + hamburger -->
            <button class="header-mobile-btn"
                    onclick="document.getElementById('mobile-search-overlay').classList.toggle('hidden')">
                <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round"
                          d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                </svg>
            </button>
            <button class="header-mobile-btn"
                    onclick="document.getElementById('mobile-menu').classList.toggle('hidden')">
                <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round"
                          d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"/>
                </svg>
            </button>
        </div>
    </div>

    <!-- Mobile Search Overlay -->
    <div id="mobile-search-overlay" class="mobile-search-overlay hidden">
        <form th:action="@{/search}" method="get" onsubmit="return validateSearch(this)">
            <input type="hidden" name="mode" id="mobile-search-mode" value="semantic"/>
            <div class="mobile-search-inner">
                <svg class="mobile-search-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round"
                          d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                </svg>
                <input type="text" name="query" placeholder="Search novels..." class="mobile-search-input"/>
            </div>
            <div class="mobile-search-actions">
                <button type="button" id="mobile-mode-toggle"
                        class="search-mode-toggle"
                        onclick="toggleSearchMode()"
                        title="Toggle: Semantic AI / Keyword">AI
                </button>
                <a th:href="@{/search/filter}" class="search-filter-link">
                    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round"
                              d="M10.5 6h9.75M10.5 6a1.5 1.5 0 11-3 0m3 0a1.5 1.5 0 10-3 0M3.75 6H7.5m3 12h9.75m-9.75 0a1.5 1.5 0 01-3 0m3 0a1.5 1.5 0 00-3 0m-3.75 0H7.5m9-6h3.75m-3.75 0a1.5 1.5 0 01-3 0m3 0a1.5 1.5 0 00-3 0m-9.75 0h9.75"/>
                    </svg>
                </a>
            </div>
        </form>
    </div>

    <!-- Mobile Menu -->
    <div id="mobile-menu" class="mobile-menu hidden">
        <a th:href="@{/}" class="mobile-menu-link mobile-menu-link--white">Home</a>

        <!-- Mobile Genres -->
        <div>
            <button onclick="this.nextElementSibling.classList.toggle('hidden')" class="mobile-genres-btn">
                Genres
                <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5"/>
                </svg>
            </button>
            <div class="mobile-genres-list hidden">
                <a th:each="genre : ${headerGenres}"
                   th:href="@{/search(genre=${genre.name})}"
                   th:text="${#strings.capitalize(#strings.toLowerCase(genre.name.name()))}"
                   class="genres-dropdown-item"></a>
            </div>
        </div>

        <a th:if="${isLoggedIn}" th:href="@{/user/favorite-novels}" class="mobile-menu-link">Favourite</a>
        <a th:href="@{/user/translations}" class="mobile-menu-link">Contribute</a>

        <div class="mobile-menu-divider"></div>

        <!-- Mobile logged in -->
        <div th:if="${isLoggedIn}">
            <a th:href="@{/user/profile}" class="mobile-menu-link">Profile</a>
            <form action="/logout" method="post">
                <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}"/>
                <button type="submit" class="mobile-menu-logout-btn">Logout</button>
            </form>
        </div>

        <!-- Mobile guest -->
        <div th:if="${!isLoggedIn}">
            <a th:href="@{/login}" class="mobile-menu-link">Login</a>
            <a th:href="@{/register}" class="mobile-menu-link">Register</a>
        </div>
    </div>
</header>

</body>
</html>
