<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="stylesheet" th:href="@{/css/fragments/pagination.css}">
</head>
<!--
  Reusable pagination fragment (0-based).
  Required model attributes:
    - currentPage  : 0-based current page index
    - totalPages   : total number of pages
    - baseUrl      : e.g. "/search", "/user/favorite-novels"
    - extraParams  : (optional) extra query string like "genre=FANTASY"
-->
<div th:fragment="pagination" th:if="${totalPages != null and totalPages > 1}"
     class="pagination">

    <!-- Prev arrow -->
    <a th:href="${baseUrl + '?page=' + (currentPage > 0 ? currentPage - 1 : 0) + (extraParams != null and !extraParams.isEmpty() ? '&' + extraParams : '')}"
       th:classappend="${currentPage == 0} ? 'pagination-btn--disabled' : ''"
       class="pagination-btn">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
        </svg>
    </a>

    <th:block th:each="i : ${#numbers.sequence(0, totalPages - 1)}">
        <!-- First page shortcut -->
        <a th:if="${i == 0 and currentPage > 2}"
           th:href="${baseUrl + '?page=0' + (extraParams != null and !extraParams.isEmpty() ? '&' + extraParams : '')}"
           class="pagination-btn">1</a>

        <!-- Leading ellipsis -->
        <span th:if="${i == 0 and currentPage > 3}"
              class="pagination-ellipsis">...</span>

        <!-- Windowed page numbers -->
        <a th:if="${i >= currentPage - 2 and i <= currentPage + 2}"
           th:href="${baseUrl + '?page=' + i + (extraParams != null and !extraParams.isEmpty() ? '&' + extraParams : '')}"
           th:classappend="${i == currentPage} ? 'pagination-btn--active' : ''"
           class="pagination-btn"
           th:text="${i + 1}">1</a>

        <!-- Trailing ellipsis -->
        <span th:if="${i == totalPages - 1 and currentPage < totalPages - 4}"
              class="pagination-ellipsis">...</span>

        <!-- Last page shortcut -->
        <a th:if="${i == totalPages - 1 and currentPage < totalPages - 3}"
           th:href="${baseUrl + '?page=' + (totalPages - 1) + (extraParams != null and !extraParams.isEmpty() ? '&' + extraParams : '')}"
           class="pagination-btn"
           th:text="${totalPages}">99</a>
    </th:block>

    <!-- Next arrow -->
    <a th:href="${baseUrl + '?page=' + (currentPage < totalPages - 1 ? currentPage + 1 : totalPages - 1) + (extraParams != null and !extraParams.isEmpty() ? '&' + extraParams : '')}"
       th:classappend="${currentPage >= totalPages - 1} ? 'pagination-btn--disabled' : ''"
       class="pagination-btn">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/>
        </svg>
    </a>

</div>
</html>
