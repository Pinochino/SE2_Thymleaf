<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<!--
  Reusable pagination fragment.
  Parameters (all from model):
    - currentPage  : 0-based current page index
    - totalPages   : total number of pages
    - baseUrl      : e.g. "/search", "/user/favorite-novels"
    - extraParams  : (optional) extra query string like "genre=FANTASY&sort=asc"
-->
<div th:fragment="pagination" th:if="${totalPages != null and totalPages > 1}"
     class="mt-10 flex justify-center items-center gap-2 flex-wrap pb-4">

    <!-- Prev -->
    <a th:href="${baseUrl + '?page=' + (currentPage > 0 ? currentPage - 1 : 0) + (extraParams != null and !extraParams.isEmpty() ? '&' + extraParams : '')}"
       th:classappend="${currentPage == 0} ? 'pointer-events-none opacity-50' : ''"
       class="w-[40px] h-[40px] rounded-[8px] bg-[#1e293b] text-[#94a3b8] flex items-center justify-center hover:bg-[#2d3446] transition text-[14px]">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
        </svg>
    </a>

    <!-- First page + ellipsis -->
    <a th:if="${currentPage > 2}"
       th:href="${baseUrl + '?page=0' + (extraParams != null and !extraParams.isEmpty() ? '&' + extraParams : '')}"
       class="w-[40px] h-[40px] rounded-[8px] flex items-center justify-center text-[14px] font-bold transition bg-[#1e293b] text-[#94a3b8] hover:bg-[#2d3446]">1</a>
    <span th:if="${currentPage > 3}" class="w-[40px] h-[40px] flex items-center justify-center text-[#94a3b8]">...</span>

    <!-- Page numbers (window of 5) -->
    <th:block th:with="
        winStart=${T(Math).max(0, currentPage - 2)},
        winEnd=${T(Math).min(totalPages - 1, currentPage + 2)}">
        <th:block th:with="
            adjStart=${T(Math).max(0, T(Math).min(winStart, totalPages - 5))},
            adjEnd=${T(Math).min(totalPages - 1, T(Math).max(winEnd, 4))}">
            <th:block th:each="i : ${#numbers.sequence(adjStart, adjEnd)}">
                <a th:href="${baseUrl + '?page=' + i + (extraParams != null and !extraParams.isEmpty() ? '&' + extraParams : '')}"
                   class="w-[40px] h-[40px] rounded-[8px] flex items-center justify-center text-[14px] font-bold transition"
                   th:classappend="${i == currentPage} ? 'bg-[#144bb8] text-white' : 'bg-[#1e293b] text-[#94a3b8] hover:bg-[#2d3446]'"
                   th:text="${i + 1}">1</a>
            </th:block>
        </th:block>
    </th:block>

    <!-- Ellipsis + last page -->
    <span th:if="${currentPage < totalPages - 4}" class="w-[40px] h-[40px] flex items-center justify-center text-[#94a3b8]">...</span>
    <a th:if="${currentPage < totalPages - 3}"
       th:href="${baseUrl + '?page=' + (totalPages - 1) + (extraParams != null and !extraParams.isEmpty() ? '&' + extraParams : '')}"
       class="w-[40px] h-[40px] rounded-[8px] flex items-center justify-center text-[14px] font-bold transition bg-[#1e293b] text-[#94a3b8] hover:bg-[#2d3446]"
       th:text="${totalPages}">99</a>

    <!-- Next -->
    <a th:href="${baseUrl + '?page=' + (currentPage < totalPages - 1 ? currentPage + 1 : totalPages - 1) + (extraParams != null and !extraParams.isEmpty() ? '&' + extraParams : '')}"
       th:classappend="${currentPage >= totalPages - 1} ? 'pointer-events-none opacity-50' : ''"
       class="w-[40px] h-[40px] rounded-[8px] bg-[#1e293b] text-[#94a3b8] flex items-center justify-center hover:bg-[#2d3446] transition text-[14px]">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/>
        </svg>
    </a>
</div>
</html>
