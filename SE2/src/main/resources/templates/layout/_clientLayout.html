<head>

    <meta name="_csrf" th:content="${_csrf?.token}">

    <title>Title</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/output.css}">
    <link rel="stylesheet" th:href="@{/css/client/client-style.css}">
    <link rel="stylesheet" th:href="@{/css/client/client-layout.css}">
    <link rel="stylesheet" th:href="@{/css/fragments/header.css}">
    <link rel="stylesheet" th:href="@{/css/fragments/footer.css}">
</head>
<body>

<header th:insert="~{fragments/client/client-header :: header}"></header>

<main id="content" layout:fragment="content">
</main>

<footer th:insert="~{fragments/client/client-footer :: footer}"></footer>

<script th:src="@{/js/main.js}"></script>
<script src="https://code.jquery.com/jquery-3.7.1.js"
        integrity="sha256-eKhayi8LEQwp4NKxN+CfCh+3qOVUtJn3QNZ0TciWLP4="

</html>
