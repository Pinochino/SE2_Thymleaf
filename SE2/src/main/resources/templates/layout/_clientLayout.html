<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <meta name="_csrf" th:content="${_csrf?.token}">
    <meta name="_csrf_header" th:content="${_csrf?.headerName}">
    <title>Title</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/output.css}">
    <link rel="stylesheet" th:href="@{/css/client/client-style.css}">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.3.0/flowbite.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        display: ["Cinzel", "serif"],
                        body: ["DM Sans", "sans-serif"],
                        mono: ["DM Mono", "monospace"],
                    },
                    colors: {
                        navy: {
                            950: "#07090f",
                            900: "#0d1117",
                            800: "#111827",
                            700: "#161d2c",
                            600: "#1a2333",
                        },
                        teal: {
                            accent: "#4de0d0",
                            soft: "#2ec4b6",
                            dim: "#1a7a72",
                        },
                        gold: {
                            accent: "#c9a84c",
                            soft: "#e2c97e",
                        },
                    },
                },
            },
        };
    </script>
    <style>

        /* ── User Avatar Dropdown ── */
        .user-avatar-wrap {
            position: relative;
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, #2ec4b6, #1a7a72);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 700;
            color: #fff;
            cursor: pointer;
            border: 2px solid transparent;
            transition: border-color 0.2s, box-shadow 0.2s;
            user-select: none;
        }

        .user-avatar:hover {
            border-color: rgba(77, 224, 208, 0.5);
            box-shadow: 0 0 0 3px rgba(77, 224, 208, 0.1);
        }

        .user-avatar.open {
            border-color: #4de0d0;
            box-shadow: 0 0 0 3px rgba(77, 224, 208, 0.15);
        }

        /* Dropdown */
        .user-dropdown {
            position: absolute;
            top: calc(100% + 10px);
            right: 0;
            width: 220px;
            background: #0d1117;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 6px;
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(77, 224, 208, 0.06);
            opacity: 0;
            visibility: hidden;
            transform: translateY(-8px);
            transition: opacity 0.18s ease, transform 0.18s ease, visibility 0.18s;
            z-index: 200;
        }

        .user-dropdown.open {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        /* Arrow tip */
        .user-dropdown::before {
            content: "";
            position: absolute;
            top: -6px;
            right: 10px;
            width: 10px;
            height: 10px;
            background: #0d1117;
            border-left: 1px solid rgba(255, 255, 255, 0.08);
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            transform: rotate(45deg);
        }

        /* Dropdown header (user info) */
        .dropdown-header {
            padding: 10px 12px 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .dropdown-avatar-lg {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #2ec4b6, #1a7a72);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            font-weight: 700;
            color: #fff;
            flex-shrink: 0;
        }

        .dropdown-username {
            font-size: 0.82rem;
            font-weight: 600;
            color: #e2e8f0;
        }

        .dropdown-email {
            font-size: 0.68rem;
            color: #475569;
            margin-top: 1px;
        }

        /* Dropdown items */
        .dropdown-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.78rem;
            color: #94a3b8;
            cursor: pointer;
            transition: background 0.12s, color 0.12s;
        }

        .dropdown-item:hover {
            background: rgba(255, 255, 255, 0.05);
            color: #e2e8f0;
        }

        .dropdown-item svg {
            flex-shrink: 0;
            opacity: 0.7;
        }

        .dropdown-item:hover svg {
            opacity: 1;
        }

        .dropdown-divider {
            height: 1px;
            background: rgba(255, 255, 255, 0.06);
            margin: 6px 0;
        }

        .dropdown-item.danger {
            color: #f87171;
        }

        .dropdown-item.danger:hover {
            background: rgba(248, 113, 113, 0.08);
            color: #fca5a5;
        }

        /* ── Hero ── */
        .hero {
            position: relative;
            overflow: hidden;
            background: linear-gradient(to bottom, #0d1117, #07090f);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .hero-art {
            position: absolute;
            inset: 0;
            pointer-events: none;
            background: radial-gradient(ellipse 60% 80% at 80% 40%, rgba(46, 196, 182, 0.08) 0%, transparent 65%),
            radial-gradient(ellipse 40% 50% at 90% 80%, rgba(201, 168, 76, 0.05) 0%, transparent 60%);
        }

        .trending-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(77, 224, 208, 0.08);
            border: 1px solid rgba(77, 224, 208, 0.2);
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 0.7rem;
            color: #4de0d0;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .trending-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #4de0d0;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1
            }
            50% {
                opacity: 0.4
            }
        }

        .hero-title {
            font-family: "Cinzel", serif;
            font-size: clamp(1.6rem, 4vw, 2.4rem);
            font-weight: 700;
            color: #e2e8f0;
            line-height: 1.15;
        }

        .hero-title-accent {
            color: #4de0d0;
        }

        .star {
            color: #c9a84c;
        }

        .read-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #4de0d0;
            color: #07090f;
            border: none;
            border-radius: 8px;
            padding: 10px 22px;
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s, transform 0.1s;
        }

        .read-btn:hover {
            background: #2ec4b6;
            transform: translateY(-1px);
        }

        /* ── Sections ── */
        .section-title {
            font-family: "Cinzel", serif;
            font-weight: 600;
            color: #e2e8f0;
        }

        .section-label {
            font-size: 0.72rem;
            color: #475569;
            margin-top: 2px;
        }

        .cards-grid {
            display: grid;
            gap: 14px;
        }

        .cards-grid-5 {
            grid-template-columns: repeat(2, 1fr);
        }

        @media (min-width: 480px) {
            .cards-grid-5 {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (min-width: 768px) {
            .cards-grid-5 {
                grid-template-columns: repeat(5, 1fr);
            }
        }

        .novel-card {
            aspect-ratio: 2/3;
            border-radius: 10px;
            overflow: hidden;
            background: linear-gradient(135deg, #161d2c, #1a2333);
            border: 1px solid rgba(255, 255, 255, 0.06);
            position: relative;
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
        }

        .novel-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.5);
        }

        .novel-card-inner {
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(77, 224, 208, 0.04), transparent);
        }

        .rating-badge {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(7, 9, 15, 0.8);
            border: 1px solid rgba(201, 168, 76, 0.3);
            border-radius: 6px;
            padding: 2px 6px;
            font-size: 0.62rem;
            color: #c9a84c;
            font-family: "DM Mono", monospace;
        }

        .novel-card-title {
            font-size: 0.75rem;
            font-weight: 600;
            color: #e2e8f0;
            margin-top: 8px;
        }

        .novel-card-meta {
            font-size: 0.65rem;
            color: #475569;
            margin-top: 2px;
        }

        .add-card {
            aspect-ratio: 2/3;
            border-radius: 10px;
            border: 1px dashed rgba(255, 255, 255, 0.08);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 12px;
            cursor: pointer;
            transition: border-color 0.15s;
        }

        .add-card:hover {
            border-color: rgba(77, 224, 208, 0.25);
        }

        .add-card-plus {
            font-size: 1.5rem;
            color: #334155;
        }

        .manage-btn {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 7px;
            padding: 5px 12px;
            font-size: 0.72rem;
            color: #64748b;
            cursor: pointer;
            transition: color 0.15s, border-color 0.15s;
        }

        .manage-btn:hover {
            color: #e2e8f0;
            border-color: rgba(255, 255, 255, 0.15);
        }

        .view-all {
            font-size: 0.72rem;
            color: #4de0d0;
            cursor: pointer;
        }

        .view-all:hover {
            text-decoration: underline;
        }

        /* ── Updates table ── */
        .updates-table {
            width: 100%;
            border-collapse: collapse;
        }

        .updates-table th {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #334155;
            font-weight: 500;
            padding: 12px 8px;
            text-align: left;
        }

        .updates-table td {
            padding: 12px 8px;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
        }

        .updates-table tr:last-child td {
            border-bottom: none;
        }

        .novel-name-link {
            font-size: 0.8rem;
            color: #94a3b8;
            cursor: pointer;
            transition: color 0.15s;
        }

        .novel-name-link:hover {
            color: #4de0d0;
        }

        .chapter-tag {
            font-size: 0.7rem;
            font-family: "DM Mono", monospace;
            color: #4de0d0;
            background: rgba(77, 224, 208, 0.08);
            border-radius: 5px;
            padding: 2px 8px;
        }

        .time-label {
            font-size: 0.68rem;
            color: #334155;
            font-family: "DM Mono", monospace;
        }


    </style>
</head>
<body>

<header th:insert="~{fragments/client/client-header :: header}"></header>

<main id="content" layout:fragment="content">
</main>

<footer th:insert="~{fragments/client/client-footer :: footer}"></footer>

<script th:src="@{/js/main.js}"></script>
<script src="https://code.jquery.com/jquery-3.7.1.js" integrity="sha256-eKhayi8LEQwp4NKxN+CfCh+3qOVUtJn3QNZ0TciWLP4="
        crossorigin="anonymous"></script>
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
</body>
</html>
