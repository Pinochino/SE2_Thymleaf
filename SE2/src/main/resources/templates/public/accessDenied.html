<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Access Denied</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body{
            font-family: "DM Sans", sans-serif;
        }
    </style>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">

<div class="bg-white shadow-xl rounded-2xl p-10 text-center max-w-md w-full">

    <!-- Icon -->
    <div class="flex justify-center mb-6">
        <div class="w-16 h-16 flex items-center justify-center rounded-full bg-red-100">
            <svg class="w-8 h-8 text-red-600"
                 fill="none"
                 stroke="currentColor"
                 stroke-width="2"
                 viewBox="0 0 24 24">
                <path stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M12 9v2m0 4h.01M5.07 19h13.86c1.54 0 2.5-1.67 1.73-3L13.73 4c-.77-1.33-2.69-1.33-3.46 0L3.34 16c-.77 1.33.19 3 1.73 3z"/>
            </svg>
        </div>
    </div>

    <!-- Title -->
    <h1 class="text-2xl font-bold text-gray-800 mb-2">
        Access Denied
    </h1>

    <!-- Description -->
    <p class="text-gray-500 mb-6">
        Sorry, you do not have permission to view this page.
        Please contact the administrator or go back to the homepage.
    </p>

    <!-- Button -->
    <a th:href="@{/}"
       class="inline-block px-6 py-3 bg-violet-600 text-white font-medium rounded-xl shadow hover:bg-violet-700 transition">
        Go to Homepage
    </a>

</div>

</body>
</html>
