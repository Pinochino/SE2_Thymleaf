<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>404 - Page Not Found</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Roboto', sans-serif;
        }
    </style>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">

<div class="text-center bg-white p-10 rounded-2xl shadow-lg max-w-md">

    <!-- 404 -->
    <h1 class="text-6xl font-bold text-indigo-600 mb-4">404</h1>

    <!-- Title -->
    <h2 class="text-2xl font-semibold text-gray-800 mb-3">
        Page Not Found
    </h2>

    <!-- Description -->
    <p class="text-gray-500 mb-6">
        Oops! The page you are looking for does not exist or has been moved.
    </p>

    <!-- Button -->
    <a href="/"
       class="inline-block bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-3 rounded-lg font-medium shadow transition">
        Go Back Home
    </a>

</div>

</body>
</html>
